---
# only_office_create.yml
#
# Deployt die ONLYOFFICE Workspace Community Edition als drei eigenständige
# Podman-Container mit je eigener IP im Bridge-Netzwerk (Aardvark).
#
# Container:
#   only-office-mysql  <IP_OO_MYSQL>  MySQL 8.4        (externe Datenbank)
#   only-office-docs   <IP_OO_DOCS>   Document Server  (Editor-Engine)
#   only-office-app    <IP_OO_APP>    Community Server (Workspace-UI)
#
# Voraussetzung: gebridgtes Aardvark-Netzwerk in Podman (siehe README.md)
#
# Erster Aufruf: http://<IP_OO_APP>/ → Weiterleitung zu /Wizard.aspx
# (Admin-E-Mail und Passwort setzen)
#
# Nutzung:
#   ansible-playbook -i hosts.yml only_containers/only_office_create.yml
#
# Update (neue Images, Daten bleiben):
#   ansible-playbook -i hosts.yml only_containers/only_office_delete.yml
#   ansible-playbook -i hosts.yml only_containers/only_office_create.yml

- name: ONLYOFFICE Workspace deployen
  hosts: <ZIELHOST>
  gather_facts: false

  vars:
    mysql:
      name:          "only-office-mysql"
      ip:            "<IP_OO_MYSQL>"
      mac:           "<MAC_OO_MYSQL>"
      root_password: "BITTE_AENDERN_MYSQL_ROOT"
      database:      "onlyoffice"
      user:          "onlyoffice_user"
      password:      "BITTE_AENDERN_MYSQL_PASS"
    docs:
      name: "only-office-docs"
      ip:   "<IP_OO_DOCS>"
      mac:  "<MAC_OO_DOCS>"
    app:
      name: "only-office-app"
      ip:   "<IP_OO_APP>"
      mac:  "<MAC_OO_APP>"
    net: "<NETZWERK_NAME>"
    images:
      mysql: "docker.io/mysql:8.4"
      docs:  "docker.io/onlyoffice/documentserver:latest"
      app:   "docker.io/onlyoffice/communityserver:latest"
    # Basisverzeichnis für persistente Volumes auf dem Host
    data_dir: "/var/pods/only_office"
    jwt_secret: "BITTE_AENDERN_JWT_SECRET"
    # MySQL 8.4 Strict Mode lässt die ONLYOFFICE-Schema-SQL (Zero-Date-Defaults)
    # nicht zu. Der permissive sql_mode ist hier erforderlich.
    mysql_sql_mode: "ERROR_FOR_DIVISION_BY_ZERO,NO_ENGINE_SUBSTITUTION"

  tasks:

    # ── 1. Images ziehen ─────────────────────────────────────────────────────
    - name: Aktuelle Container-Images ziehen
      containers.podman.podman_image:
        name:  "{{ item }}"
        state: present
        force: true
      loop:
        - "{{ images.mysql }}"
        - "{{ images.docs }}"
        - "{{ images.app }}"

    # ── 2. Verzeichnisse anlegen ─────────────────────────────────────────────
    - name: Persistente Volume-Verzeichnisse anlegen
      ansible.builtin.file:
        path:  "{{ data_dir }}/{{ item }}"
        owner: root
        group: root
        mode:  '0777'
        state: directory
      loop:
        - mysql
        - docs_pgsql
        - docs_data
        - docs_logs
        - docs_lib
        - app_data
        - app_logs

    # ── 4. MySQL-Container ───────────────────────────────────────────────────
    # Permissiver sql_mode, damit das ONLYOFFICE-Schema (Zero-Date-Defaults)
    # ohne Fehler eingespielt werden kann.
    - name: MySQL-Container starten
      containers.podman.podman_container:
        name:        "{{ mysql.name }}"
        image:       "{{ images.mysql }}"
        state:       started
        network:     "{{ net }}:ip={{ mysql.ip }}"
        mac_address: "{{ mysql.mac }}"
        command:     "--sql-mode={{ mysql_sql_mode }}"
        volumes:
          - "{{ data_dir }}/mysql:/var/lib/mysql:Z"
          - "/etc/localtime:/etc/localtime:ro"
        env:
          MYSQL_ROOT_PASSWORD: "{{ mysql.root_password }}"
          MYSQL_DATABASE:      "{{ mysql.database }}"
          MYSQL_USER:          "{{ mysql.user }}"
          MYSQL_PASSWORD:      "{{ mysql.password }}"

    # ── 5. Warten auf MySQL ──────────────────────────────────────────────────
    - name: Warten bis MySQL Verbindungen annimmt
      ansible.builtin.command:
        cmd: >
          podman exec {{ mysql.name }}
          mysqladmin ping -h localhost -u root -p{{ mysql.root_password }} --silent
      register: _mysql_ready
      until: _mysql_ready.rc == 0
      retries: 30
      delay: 5
      changed_when: false

    - name: sql_mode auch zur Laufzeit erzwingen
      ansible.builtin.command:
        cmd: >
          podman exec {{ mysql.name }}
          mysql -uroot -p{{ mysql.root_password }}
          -e "SET GLOBAL sql_mode='{{ mysql_sql_mode }}';"
      changed_when: false

    # ── 6. Document-Server-Container ─────────────────────────────────────────
    - name: ONLYOFFICE Document Server starten
      containers.podman.podman_container:
        name:        "{{ docs.name }}"
        image:       "{{ images.docs }}"
        state:       started
        network:     "{{ net }}:ip={{ docs.ip }}"
        mac_address: "{{ docs.mac }}"
        volumes:
          - "{{ data_dir }}/docs_pgsql:/var/lib/postgresql:Z"
          - "{{ data_dir }}/docs_data:/var/www/onlyoffice/Data:Z"
          - "{{ data_dir }}/docs_logs:/var/log/onlyoffice:Z"
          - "{{ data_dir }}/docs_lib:/var/lib/onlyoffice:Z"
          - "/etc/localtime:/etc/localtime:ro"
        env:
          JWT_ENABLED: "true"
          JWT_SECRET:  "{{ jwt_secret }}"

    # ── 7. Warten auf Document Server ────────────────────────────────────────
    - name: Warten auf Document-Server-Healthcheck
      ansible.builtin.command:
        cmd: "podman exec {{ docs.name }} curl -sf http://localhost/healthcheck"
      register: _docs_ready
      until: _docs_ready.rc == 0 and _docs_ready.stdout == "true"
      retries: 30
      delay: 10
      changed_when: false

    # ── 8. Community-Server-Container ────────────────────────────────────────
    # --privileged: von der offiziellen ONLYOFFICE-Docker-Dokumentation verlangt
    #   (systemd als PID 1 benötigt cgroup-Verwaltung)
    # --cgroupns=host: nötig auf Fedora/EL9 mit cgroup v2, damit das Startup-
    #   Skript die libpod-Umgebung korrekt erkennt
    - name: ONLYOFFICE Community Server starten
      containers.podman.podman_container:
        name:        "{{ app.name }}"
        image:       "{{ images.app }}"
        state:       started
        privileged:  true
        cgroupns:    host
        systemd:     always
        network:     "{{ net }}:ip={{ app.ip }}"
        mac_address: "{{ app.mac }}"
        volumes:
          - "{{ data_dir }}/app_data:/var/www/onlyoffice/Data:Z"
          - "{{ data_dir }}/app_logs:/var/log/onlyoffice:Z"
          - "/etc/localtime:/etc/localtime:ro"
        env:
          MYSQL_SERVER_HOST:                "{{ mysql.ip }}"
          MYSQL_SERVER_PORT:                "3306"
          MYSQL_SERVER_DB_NAME:             "{{ mysql.database }}"
          MYSQL_SERVER_USER:                "{{ mysql.user }}"
          MYSQL_SERVER_PASS:                "{{ mysql.password }}"
          DOCUMENT_SERVER_PORT_80_TCP_ADDR: "{{ docs.ip }}"
          DOCUMENT_SERVER_PORT_80_TCP_PORT: "80"
          DOCUMENT_SERVER_JWT_ENABLED:      "true"
          DOCUMENT_SERVER_JWT_SECRET:       "{{ jwt_secret }}"
          DOCUMENT_SERVER_JWT_HEADER:       "Authorization"

    # ── 9. Warten auf Community-Server-Monoserve ─────────────────────────────
    # Das Startup-Skript führt Setup (~30s) aus, startet dann systemd als PID 1,
    # der monoserve startet und JIT-kompiliert die ASP.NET-App (~60s).
    - name: Warten bis Community-Server-Monoserve-Socket erscheint
      ansible.builtin.command:
        cmd: >
          podman exec {{ app.name }}
          test -S /var/run/onlyoffice/onlyoffice.socket
      register: _socket_ready
      until: _socket_ready.rc == 0
      retries: 40
      delay: 5
      changed_when: false

    # ── 10. Datenbank-Schema einrichten (nur Erst-Deployment) ────────────────
    # Das Community-Server-Startup-Skript soll die SQL-Dateien selbst einspielen,
    # scheitert aber, weil es dazu den MySQL-root-Account benötigt (kein Remote-Zugang).
    # Wir prüfen auf leere DB und spielen die Schema-Dateien direkt ein.
    - name: Prüfen ob ONLYOFFICE-Schema bereits existiert
      ansible.builtin.command:
        cmd: >
          podman exec {{ mysql.name }}
          mysql -u{{ mysql.user }} -p{{ mysql.password }}
          -e "SELECT COUNT(*) FROM information_schema.tables
              WHERE table_schema='{{ mysql.database }}';"
          --skip-column-names
      register: _table_count
      changed_when: false

    - name: ONLYOFFICE-Schema einspielen (onlyoffice.sql)
      ansible.builtin.command:
        cmd: >
          podman exec {{ app.name }}
          bash -c "mysql
            --defaults-extra-file=/etc/mysql/conf.d/client.cnf
            -D {{ mysql.database }} <
            /var/www/onlyoffice/Sql/onlyoffice.sql"
      when: _table_count.stdout | trim == "0"
      changed_when: true

    - name: ONLYOFFICE-Daten einspielen (onlyoffice.data.sql)
      ansible.builtin.command:
        cmd: >
          podman exec {{ app.name }}
          bash -c "mysql
            --defaults-extra-file=/etc/mysql/conf.d/client.cnf
            --init-command=\"SET sql_mode='{{ mysql_sql_mode }}';\"
            -D {{ mysql.database }} <
            /var/www/onlyoffice/Sql/onlyoffice.data.sql"
      when: _table_count.stdout | trim == "0"
      changed_when: true

    - name: Monoserve nach Schema-Initialisierung neu starten
      ansible.builtin.command:
        cmd: "podman exec {{ app.name }} systemctl restart monoserve"
      when: _table_count.stdout | trim == "0"
      changed_when: true

    # ── 11. Abschließender Healthcheck ───────────────────────────────────────
    - name: Community-Server-API auf Verfügbarkeit prüfen
      ansible.builtin.command:
        cmd: >
          podman exec {{ app.name }}
          bash -c "sleep 20 && curl -sf
            http://localhost/api/2.0/capabilities.json |
            grep -q '\"statusCode\":200'"
      register: _app_ready
      until: _app_ready.rc == 0
      retries: 10
      delay: 10
      changed_when: false
