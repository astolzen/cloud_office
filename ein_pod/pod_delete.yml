---
# pod_delete.yml
#
# Stoppt und entfernt den Podman-Pod und alle enthaltenen Container.
# Persistente Daten unter /var/pods/nextcloud_pod/ bleiben erhalten.
#
# Nutzung:
#   ansible-playbook -i hosts.yml ein_pod/pod_delete.yml

- name: nc-pod und alle Container entfernen (Daten bleiben erhalten)
  hosts: <ZIELHOST>
  gather_facts: false
  vars_files:
    - pod_vars.yml

  tasks:

    - name: Pod entfernen (stoppt und entfernt alle enthaltenen Container)
      containers.podman.podman_pod:
        name:  "{{ pod.name }}"
        state: absent
