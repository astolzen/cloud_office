---
# pod_create.yml
#
# Deployt Nextcloud + OnlyOffice Document Server als vier Container
# in einem einzigen Podman-Pod auf dem Host-Netzwerk.
#
# Pod:  nc-pod  (Host-Netzwerk)
# Portweiterleitung:
#   8088 → 80    (Nextcloud)
#   8080 → 8080  (OnlyOffice Document Server)
#
# Container (teilen sich 127.0.0.1 im Pod-Netzwerk-Namespace):
#   ncp-mariadb  :3306  MariaDB LTS
#   ncp-redis    :6379  Valkey
#   ncp-docs     :8080  OnlyOffice Document Server (nginx auf :80 → :8080 gepatcht)
#   ncp-app      :80    Nextcloud (Apache)
#
# Alle Werte aus pod_vars.yml anpassen, bevor das Playbook ausgeführt wird.
#
# Nutzung:
#   ansible-playbook -i hosts.yml ein_pod/pod_create.yml
#
# Update (neue Images, Daten bleiben):
#   ansible-playbook -i hosts.yml ein_pod/pod_delete.yml
#   ansible-playbook -i hosts.yml ein_pod/pod_create.yml

- name: Nextcloud + OnlyOffice in einem Podman-Pod deployen
  hosts: <ZIELHOST>
  gather_facts: false
  vars_files:
    - pod_vars.yml

  tasks:

    # ── 0. Host-Tuning ───────────────────────────────────────────────────────
    # Valkey benötigt vm.overcommit_memory=1 für sichere Hintergrund-Saves.
    - name: vm.overcommit_memory=1 für Valkey setzen
      ansible.posix.sysctl:
        name:   vm.overcommit_memory
        value:  "1"
        state:  present
        reload: true

    # ── 1. Images ziehen ─────────────────────────────────────────────────────
    - name: Aktuelle Container-Images ziehen
      containers.podman.podman_image:
        name:  "{{ item }}"
        state: present
        force: true
      loop:
        - "{{ images.mariadb }}"
        - "{{ images.redis }}"
        - "{{ images.app }}"
        - "{{ images.docs }}"

    # ── 2. ZFS-Datasets anlegen ──────────────────────────────────────────────
    - name: Übergeordnetes ZFS-Dataset anlegen
      community.general.zfs:
        name:  "{{ zfs.parent }}"
        state: present
        extra_zfs_properties:
          compression: lz4

    - name: ZFS-Datasets für persistente Volumes anlegen
      community.general.zfs:
        name:  "{{ zfs.parent }}/{{ item }}"
        state: present
        extra_zfs_properties:
          compression: lz4
      loop:
        - mariadb
        - app_html
        - docs_pgsql
        - docs_data
        - docs_logs
        - docs_lib

    # ── 3. Berechtigungen setzen ─────────────────────────────────────────────
    - name: Berechtigungen auf Volume-Verzeichnissen setzen
      ansible.builtin.file:
        path:  "{{ mnt.base }}/{{ item }}"
        owner: root
        group: root
        mode:  '0777'
        state: directory
      loop:
        - mariadb
        - app_html
        - docs_pgsql
        - docs_data
        - docs_logs
        - docs_lib

    # ── 4. Podman-Pod erstellen ──────────────────────────────────────────────
    # Host-Netzwerk: kein separates Bridge-Netzwerk erforderlich.
    # Ports 8088 (Nextcloud) und 8080 (Document Server) werden weitergeleitet.
    - name: Podman-Pod erstellen
      containers.podman.podman_pod:
        name:    "{{ pod.name }}"
        network: "{{ pod.network }}"
        publish: "{{ pod.publish }}"
        state:   created

    # ── 5. MariaDB-Container ─────────────────────────────────────────────────
    - name: MariaDB-Container starten
      containers.podman.podman_container:
        name:    "{{ mariadb.name }}"
        pod:     "{{ pod.name }}"
        image:   "{{ images.mariadb }}"
        state:   started
        volumes:
          - "{{ mnt.base }}/mariadb:/var/lib/mysql:Z"
          - "/etc/localtime:/etc/localtime:ro"
        env:
          MARIADB_ROOT_PASSWORD:      "{{ mariadb.root_password }}"
          MARIADB_DATABASE:           "{{ mariadb.database }}"
          MARIADB_USER:               "{{ mariadb.user }}"
          MARIADB_PASSWORD:           "{{ mariadb.password }}"
          MARIADB_INITDB_SKIP_TZINFO: "1"
        command: >-
          --transaction-isolation=READ-COMMITTED
          --log-bin=binlog
          --binlog-format=ROW

    # ── 6. Warten auf MariaDB ────────────────────────────────────────────────
    - name: Warten bis MariaDB Verbindungen annimmt
      ansible.builtin.command:
        cmd: >
          podman exec {{ mariadb.name }}
          mariadb-admin ping -h localhost -uroot -p{{ mariadb.root_password }} --silent
      register: _db_ready
      until: _db_ready.rc == 0
      retries: 30
      delay: 5
      changed_when: false

    # ── 7. Valkey-Container ──────────────────────────────────────────────────
    - name: Valkey-Container starten
      containers.podman.podman_container:
        name:    "{{ redis.name }}"
        pod:     "{{ pod.name }}"
        image:   "{{ images.redis }}"
        state:   started
        volumes:
          - "/etc/localtime:/etc/localtime:ro"
        command: >-
          valkey-server
          --loglevel notice
          --save ""
          --appendonly no

    # ── 8. OnlyOffice Document Server ────────────────────────────────────────
    # nginx startet standardmäßig auf Port 80; Task 9 patcht ihn auf docs.port (8080).
    - name: OnlyOffice Document Server starten
      containers.podman.podman_container:
        name:    "{{ docs.name }}"
        pod:     "{{ pod.name }}"
        image:   "{{ images.docs }}"
        state:   started
        volumes:
          - "{{ mnt.base }}/docs_pgsql:/var/lib/postgresql:Z"
          - "{{ mnt.base }}/docs_data:/var/www/onlyoffice/Data:Z"
          - "{{ mnt.base }}/docs_logs:/var/log/onlyoffice:Z"
          - "{{ mnt.base }}/docs_lib:/var/lib/onlyoffice:Z"
          - "/etc/localtime:/etc/localtime:ro"
        env:
          JWT_ENABLED: "true"
          JWT_SECRET:  "{{ jwt_secret }}"

    # ── 9. Document-Server-nginx von Port 80 auf Port 8080 umstellen ─────────
    # Warten bis nginx auf :80 antwortet, dann ds.conf patchen und nginx neu laden.
    # Damit wird Port 80 für Nextclouds Apache freigegeben.
    - name: Warten auf initialen OnlyOffice-Start (Port 80)
      ansible.builtin.command:
        cmd: "podman exec {{ docs.name }} curl -sf http://localhost/healthcheck"
      register: _docs_init
      until: _docs_init.rc == 0 and _docs_init.stdout == "true"
      retries: 30
      delay: 10
      changed_when: false

    - name: OnlyOffice-nginx-Port auf {{ docs.port }} umstellen
      ansible.builtin.command:
        cmd: >-
          podman exec {{ docs.name }}
          bash -c "sed -i
          's/:80;/:{{ docs.port }};/g; s/:80 /:{{ docs.port }} /g'
          /etc/nginx/conf.d/ds.conf"
      changed_when: true

    - name: OnlyOffice-nginx mit neuem Port neu laden
      ansible.builtin.command:
        cmd: "podman exec {{ docs.name }} nginx -s reload"
      changed_when: true

    # ── 10. Nextcloud-Container ──────────────────────────────────────────────
    # Alle Backend-Dienste sind über 127.0.0.1 erreichbar (gemeinsamer Pod-Namespace).
    - name: Nextcloud-Container starten
      containers.podman.podman_container:
        name:    "{{ app.name }}"
        pod:     "{{ pod.name }}"
        image:   "{{ images.app }}"
        state:   started
        volumes:
          - "{{ mnt.base }}/app_html:/var/www/html:Z"
          - "/etc/localtime:/etc/localtime:ro"
        env:
          MYSQL_HOST:                "127.0.0.1"
          MYSQL_DATABASE:            "{{ mariadb.database }}"
          MYSQL_USER:                "{{ mariadb.user }}"
          MYSQL_PASSWORD:            "{{ mariadb.password }}"
          REDIS_HOST:                "127.0.0.1"
          REDIS_HOST_PORT:           "6379"
          NEXTCLOUD_ADMIN_USER:      "{{ app.admin_user }}"
          NEXTCLOUD_ADMIN_PASSWORD:  "{{ app.admin_password }}"
          NEXTCLOUD_TRUSTED_DOMAINS: "{{ app.trusted_domain }}"

    # ── 11. Prüfen ob Document Server auf gepatschtem Port antwortet ─────────
    - name: Warten auf Document-Server-Healthcheck auf Port {{ docs.port }}
      ansible.builtin.command:
        cmd: "podman exec {{ docs.name }} curl -sf http://localhost:{{ docs.port }}/healthcheck"
      register: _docs_ready
      until: _docs_ready.rc == 0 and _docs_ready.stdout == "true"
      retries: 10
      delay: 5
      changed_when: false

    # ── 12. Warten auf Nextcloud-Erstinstallation ────────────────────────────
    - name: Warten bis Nextcloud-Webinterface bereit ist
      ansible.builtin.command:
        cmd: >
          podman exec {{ app.name }}
          curl -sf -o /dev/null -w "%{http_code}"
          http://localhost/status.php
      register: _nc_ready
      until: _nc_ready.rc == 0 and _nc_ready.stdout == "200"
      retries: 40
      delay: 10
      changed_when: false

    # ── 13. OnlyOffice-Connector-App installieren ────────────────────────────
    - name: Prüfen ob OnlyOffice-Connector bereits installiert ist
      ansible.builtin.command:
        cmd: >
          podman exec --user www-data {{ app.name }}
          php occ app:list --output=json
      register: _app_list
      changed_when: false

    - name: OnlyOffice-Connector aus dem Nextcloud Appstore installieren
      ansible.builtin.command:
        cmd: >
          podman exec --user www-data {{ app.name }}
          php occ app:install onlyoffice
      when: '"onlyoffice" not in _app_list.stdout'
      register: _install_result
      failed_when:
        - _install_result.rc != 0
        - '"already installed" not in _install_result.stderr | default("")'

    - name: OnlyOffice-Connector-App aktivieren
      ansible.builtin.command:
        cmd: >
          podman exec --user www-data {{ app.name }}
          php occ app:enable onlyoffice
      changed_when: true

    # ── 14. OnlyOffice-Connector konfigurieren ───────────────────────────────
    # DocumentServerUrl         – Browser lädt Editor über Host-IP:8080
    # DocumentServerInternalUrl – Nextcloud-PHP erreicht Document Server intern
    # StorageUrl                – Document Server ruft Dateien über Host-IP:8088 ab
    - name: Document-Server öffentliche URL setzen
      ansible.builtin.command:
        cmd: >
          podman exec --user www-data {{ app.name }}
          php occ config:app:set onlyoffice DocumentServerUrl
          --value="http://{{ app.trusted_domain }}:{{ docs.port }}/"
      changed_when: true

    - name: Document-Server interne URL setzen
      ansible.builtin.command:
        cmd: >
          podman exec --user www-data {{ app.name }}
          php occ config:app:set onlyoffice DocumentServerInternalUrl
          --value="http://127.0.0.1:{{ docs.port }}/"
      changed_when: true

    - name: Storage-URL (Callback-URL für Document Server) setzen
      ansible.builtin.command:
        cmd: >
          podman exec --user www-data {{ app.name }}
          php occ config:app:set onlyoffice StorageUrl
          --value="http://{{ app.trusted_domain }}:8088/"
      changed_when: true

    - name: Document Server darf über Host-IP auf Nextcloud zugreifen
      ansible.builtin.command:
        cmd: >
          podman exec --user www-data {{ app.name }}
          php occ config:system:set allow_local_remote_servers
          --value=true --type=boolean
      changed_when: true

    - name: JWT im OnlyOffice-Connector aktivieren
      ansible.builtin.command:
        cmd: >
          podman exec --user www-data {{ app.name }}
          php occ config:app:set onlyoffice jwt_enabled
          --value="true"
      changed_when: true

    - name: JWT-Secret im OnlyOffice-Connector setzen
      ansible.builtin.command:
        cmd: >
          podman exec --user www-data {{ app.name }}
          php occ config:app:set onlyoffice jwt_secret
          --value="{{ jwt_secret }}"
      changed_when: true

    - name: JWT-Header im OnlyOffice-Connector setzen
      ansible.builtin.command:
        cmd: >
          podman exec --user www-data {{ app.name }}
          php occ config:app:set onlyoffice jwt_header
          --value="Authorization"
      changed_when: true

    # ── 15. Nextcloud Post-Install-Tweaks ────────────────────────────────────
    - name: Standard-Telefonregion setzen
      ansible.builtin.command:
        cmd: >
          podman exec --user www-data {{ app.name }}
          php occ config:system:set default_phone_region --value="DE"
      changed_when: true

    - name: Nextcloud-Wartungsfenster aktivieren (nachts)
      ansible.builtin.command:
        cmd: >
          podman exec --user www-data {{ app.name }}
          php occ config:system:set maintenance_window_start --type=integer --value=1
      changed_when: true

    - name: Nextcloud-Hintergrundjobs einmalig ausführen
      ansible.builtin.command:
        cmd: >
          podman exec --user www-data {{ app.name }}
          php occ background:cron
      changed_when: true
      ignore_errors: true
